<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeemawDefender — Dashboard</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ── Reset & Variables ─────────────────────────── */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --red:        #E53935;
    --red-glow:   rgba(229,57,53,.25);
    --red-dim:    #b71c1c;
    --orange:     #FB8C00;
    --yellow:     #FDD835;
    --green:      #43A047;
    --bg:         #0e0e12;
    --surface:    #18181f;
    --surface2:   #22222c;
    --border:     #2a2a36;
    --text:       #e8e6e3;
    --text-dim:   #8b8994;
    --font-head:  'Space Grotesk', sans-serif;
    --font-body:  'DM Sans', sans-serif;
    --radius:     14px;
  }

  html { font-size: 18px; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Noise overlay ─────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Layout ────────────────────────────────────── */
  .shell {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* ── Header ────────────────────────────────────── */
  header {
    text-align: center;
    padding: 2.5rem 0 1.5rem;
  }

  .shield-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 88px; height: 88px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--red-glow), transparent 70%);
    margin-bottom: 1rem;
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 var(--red-glow); transform: scale(1); }
    50%     { box-shadow: 0 0 36px 12px var(--red-glow); transform: scale(1.06); }
  }

  .shield-icon {
    font-size: 3rem;
    filter: drop-shadow(0 0 10px var(--red));
  }

  h1 {
    font-family: var(--font-head);
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -.02em;
    background: linear-gradient(135deg, var(--red), #ff7043);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: .85rem;
    margin-top: .35rem;
  }

  /* ── Status Badge ──────────────────────────────── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    padding: .6rem 1.2rem;
    border-radius: 99px;
    font-size: .8rem;
    font-weight: 600;
    width: fit-content;
    margin: 1rem auto 2rem;
    transition: all .3s;
  }
  .status-bar.online  { background: rgba(67,160,71,.12); color: var(--green); border: 1px solid rgba(67,160,71,.25); }
  .status-bar.offline { background: rgba(229,57,53,.08); color: var(--red); border: 1px solid rgba(229,57,53,.15); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .online  .status-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .offline .status-dot { background: var(--red);   box-shadow: 0 0 6px var(--red); }

  /* ── Cards ─────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    transition: border-color .25s;
  }
  .card:hover { border-color: rgba(229,57,53,.3); }

  .card-title {
    font-family: var(--font-head);
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: .45rem;
  }

  /* ── Form ──────────────────────────────────────── */
  .field { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: .78rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: .35rem;
  }

  input[type="text"],
  input[type="email"] {
    width: 100%;
    padding: .7rem 1rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font-body);
    font-size: .9rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px var(--red-glow);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    padding: .7rem 1.6rem;
    border: none;
    border-radius: 10px;
    font-family: var(--font-head);
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s, box-shadow .25s;
  }
  .btn:active { transform: scale(.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--red), #d32f2f);
    color: #fff;
    box-shadow: 0 4px 18px var(--red-glow);
  }
  .btn-primary:hover { box-shadow: 0 6px 28px var(--red-glow); }

  /* ── Toggle ────────────────────────────────────── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .15rem 0;
  }
  .toggle-label { font-size: .9rem; font-weight: 500; }

  .toggle {
    position: relative;
    width: 50px; height: 28px;
    appearance: none; -webkit-appearance: none;
    background: var(--border);
    border-radius: 99px;
    cursor: pointer;
    transition: background .25s;
    outline: none;
    border: none;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #fff;
    transition: transform .25s;
  }
  .toggle:checked { background: var(--green); }
  .toggle:checked::after { transform: translateX(22px); }

  /* ── Alerts list ───────────────────────────────── */
  .alert-empty {
    text-align: center;
    color: var(--text-dim);
    padding: 2rem 0;
    font-size: .85rem;
  }

  .alert-item {
    display: flex;
    gap: .85rem;
    padding: .85rem 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp .35s ease-out both;
  }
  .alert-item:last-child { border-bottom: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .score-badge {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: .95rem;
    color: #fff;
  }
  .score-yellow { background: linear-gradient(135deg, #f9a825, #fdd835); color: #3e2723; }
  .score-orange { background: linear-gradient(135deg, #ef6c00, #fb8c00); }
  .score-red    { background: linear-gradient(135deg, var(--red-dim), var(--red)); }

  .alert-body { flex: 1; min-width: 0; }

  .alert-type {
    font-size: .72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: .15rem;
  }
  .alert-explanation {
    font-size: .82rem;
    color: var(--text-dim);
    line-height: 1.45;
  }
  .alert-original {
    font-size: .75rem;
    color: var(--text-dim);
    opacity: .65;
    margin-top: .3rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .alert-time {
    font-size: .68rem;
    color: var(--text-dim);
    opacity: .5;
    margin-top: .2rem;
  }

  /* ── Toast ─────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .65rem 1.4rem;
    border-radius: 10px;
    font-size: .82rem;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

  /* ── Responsive ────────────────────────────────── */
  @media (max-width: 480px) {
    html { font-size: 16px; }
    .shell { padding: 1rem .85rem 3rem; }
    header { padding: 1.5rem 0 1rem; }
    .shield-wrap { width: 72px; height: 72px; }
    .shield-icon { font-size: 2.4rem; }
    h1 { font-size: 1.5rem; }
  }
</style>
</head>

<body>
<div class="shell">

  <!-- ── Header ──────────────────────────────────── -->
  <header>
    <div class="shield-wrap">
      <span class="shield-icon">🛡️</span>
    </div>
    <h1>MeemawDefender</h1>
    <p class="subtitle" id="protectLine">Setting up protection…</p>
  </header>

  <!-- ── Status ──────────────────────────────────── -->
  <div class="status-bar offline" id="statusBar">
    <span class="status-dot"></span>
    <span id="statusText">Phone disconnected</span>
  </div>

  <!-- ── Settings Card ───────────────────────────── -->
  <div class="card">
    <div class="card-title">⚙️ Settings</div>

    <div class="field">
      <label for="emailInput">Family Email (receives alerts)</label>
      <input type="email" id="emailInput" placeholder="family@gmail.com" autocomplete="email">
    </div>

    <div class="field">
      <label for="nameInput">Grandma's Name</label>
      <input type="text" id="nameInput" placeholder="Meemaw" autocomplete="off">
    </div>

    <div class="toggle-row" style="margin: 1rem 0 1.15rem;">
      <span class="toggle-label">Defender Active</span>
      <input type="checkbox" class="toggle" id="activeToggle" checked>
    </div>

    <button class="btn btn-primary" id="saveBtn" onclick="saveSettings()">
      💾 Save Settings
    </button>
  </div>

  <!-- ── Alert Log Card ──────────────────────────── -->
  <div class="card">
    <div class="card-title">🚨 Recent Alerts</div>
    <div id="alertList">
      <div class="alert-empty">No alerts yet — that's a good sign!</div>
    </div>
  </div>

  <!-- ── Analytics Card ─────────────────────────── -->
  <div class="card">
    <div class="card-title">📊 Analytics <span style="font-size:.65rem;font-weight:400;color:var(--text-dim);margin-left:8px">MongoDB Atlas Aggregation</span></div>
    <div style="margin-bottom:12px">
      <input id="searchInput" type="text" placeholder="🔍 Search alerts…" style="width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none" oninput="debounceSearch(this.value)">
    </div>
    <div id="searchResults" style="display:none;margin-bottom:16px"></div>
    <div id="analyticsChart" style="display:flex;flex-wrap:wrap;gap:10px"></div>
    <div id="topThreat" style="margin-top:14px"></div>
  </div>

</div>

<!-- ── Toast ─────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
/* ── Globals ──────────────────────────────────────── */
const API = '';   // same origin

/* ── Toast ────────────────────────────────────────── */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

/* ── Load settings ────────────────────────────────── */
async function loadSettings() {
  try {
    const res = await fetch(API + '/api/settings');
    const data = await res.json();
    document.getElementById('emailInput').value = data.familyEmail || '';
    document.getElementById('nameInput').value  = data.grandmaName || '';
    document.getElementById('activeToggle').checked = data.active !== false;
    updateProtectLine(data.grandmaName);
  } catch { /* offline — keep defaults */ }
}

function updateProtectLine(name) {
  const el = document.getElementById('protectLine');
  el.textContent = name
    ? `Defender is protecting ${name}`
    : 'Setting up protection…';
}

/* ── Save settings ────────────────────────────────── */
async function saveSettings() {
  const familyEmail = document.getElementById('emailInput').value.trim();
  const grandmaName = document.getElementById('nameInput').value.trim();
  const active      = document.getElementById('activeToggle').checked;

  if (familyEmail && !familyEmail.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
    toast('⚠️ Please enter a valid email');
    return;
  }

  try {
    const res = await fetch(API + '/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ familyEmail, grandmaName, active }),
    });
    if (res.ok) {
      toast('✅ Settings saved');
      updateProtectLine(grandmaName);
    } else {
      toast('❌ Failed to save');
    }
  } catch {
    toast('❌ Server unreachable');
  }
}

/* ── Load alerts ──────────────────────────────────── */
async function loadAlerts() {
  try {
    const res = await fetch(API + '/api/alerts');
    const alerts = await res.json();
    renderAlerts(alerts);
  } catch { /* offline */ }
}

function scoreClass(score) {
  if (score >= 90) return 'score-red';
  if (score >= 61) return 'score-orange';
  return 'score-yellow';
}

function dangerLabel(type) {
  const map = {
    money_transfer: '💸 Money Transfer',
    remote_access:  '🖥️ Remote Access',
    phishing:       '🎣 Phishing',
    fake_prize:     '🏆 Fake Prize',
    personal_data:  '🔐 Personal Data',
    safe:           '✅ Safe',
  };
  return map[type] || '⚠️ ' + (type || 'Unknown');
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return new Date(iso).toLocaleDateString();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderAlerts(alerts) {
  const container = document.getElementById('alertList');
  if (!alerts.length) {
    container.innerHTML = '<div class="alert-empty">No alerts yet — that\'s a good sign!</div>';
    return;
  }
  container.innerHTML = alerts.map((a, i) => `
    <div class="alert-item" style="animation-delay:${i * .06}s">
      <div class="score-badge ${scoreClass(a.score)}">${a.score}</div>
      <div class="alert-body">
        <div class="alert-type">${dangerLabel(a.danger_type)}</div>
        <div class="alert-explanation">${escapeHtml(a.explanation)}</div>
        ${a.original ? `<div class="alert-original" title="${escapeHtml(a.original)}">${escapeHtml(a.original)}</div>` : ''}
        <div class="alert-time">${timeAgo(a.timestamp)}</div>
      </div>
    </div>
  `).join('');
}

/* ── Connection status ────────────────────────────── */
async function checkStatus() {
  try {
    const res = await fetch(API + '/api/status');
    const data = await res.json();
    const bar = document.getElementById('statusBar');
    const txt = document.getElementById('statusText');
    if (data.connected) {
      bar.className = 'status-bar online';
      txt.textContent = 'Phone connected';
    } else {
      bar.className = 'status-bar offline';
      txt.textContent = 'Phone disconnected';
    }
  } catch {
    document.getElementById('statusBar').className = 'status-bar offline';
    document.getElementById('statusText').textContent = 'Server offline';
  }
}

/* ── Init ─────────────────────────────────────────── */
loadSettings();
loadAlerts();
checkStatus();
loadAnalytics();

// Poll every 10 seconds
setInterval(() => { loadAlerts(); checkStatus(); loadAnalytics(); }, 10000);

/* ── Analytics ────────────────────────────────────── */
async function loadAnalytics() {
  try {
    const res = await fetch(API + '/api/analytics');
    const data = await res.json();
    renderAnalytics(data);
  } catch { /* offline */ }
}

function renderAnalytics({ byType, topScore }) {
  const chart = document.getElementById('analyticsChart');
  if (!byType || !byType.length) {
    chart.innerHTML = '<span style="color:var(--text-dim);font-size:.85rem">No data yet</span>';
    return;
  }
  chart.innerHTML = byType.map(b => `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:140px;flex:1">
      <div style="font-size:.75rem;color:var(--text-dim);margin-bottom:4px">${dangerLabel(b._id)}</div>
      <div style="font-size:1.4rem;font-weight:700;font-family:var(--font-head)">${b.count}</div>
      <div style="font-size:.72rem;color:var(--text-dim)">avg score: <b style="color:var(--text)">${Math.round(b.avgScore)}</b></div>
    </div>
  `).join('');

  const topEl = document.getElementById('topThreat');
  if (topScore) {
    topEl.innerHTML = `<div style="font-size:.75rem;color:var(--text-dim);margin-bottom:4px">🏴 Highest risk alert ever — score <b style="color:#E53935">${topScore.score}</b></div>
      <div style="font-size:.82rem;color:var(--text-dim);font-style:italic">${escapeHtml(topScore.original || topScore.explanation || '')}</div>`;
  }
}

/* ── Search ───────────────────────────────────────── */
let searchTimer;
function debounceSearch(q) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(q), 350);
}

async function doSearch(q) {
  const container = document.getElementById('searchResults');
  if (!q.trim()) { container.style.display = 'none'; return; }
  try {
    const res = await fetch(API + '/api/search?q=' + encodeURIComponent(q));
    const results = await res.json();
    container.style.display = 'block';
    if (!results.length) {
      container.innerHTML = '<div style="color:var(--text-dim);font-size:.82rem">No matches found</div>';
      return;
    }
    container.innerHTML = results.map(a => `
      <div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:.82rem">
        <span class="score-badge ${scoreClass(a.score)}" style="font-size:.7rem;padding:2px 6px">${a.score}</span>
        <span style="margin-left:8px;color:var(--text)">${escapeHtml(a.original || a.explanation)}</span>
        <span style="float:right;color:var(--text-dim)">${timeAgo(a.timestamp)}</span>
      </div>
    `).join('');
  } catch { /* offline */ }
}
</script>
</body>
</html>
